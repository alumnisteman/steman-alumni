# Steman Alumni - PRODUCTION Docker Compose
services:
  app:
    image: steman-alumni-app:latest
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    working_dir: /var/www
    env_file: .env
    # Removed healthcheck temporarily to ensure startup
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - SESSION_SECURE_COOKIE=true
      - SESSION_HTTP_ONLY=true
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
      - app_public:/var/www/public
    networks:
      - steman-network
    depends_on:
      - db
      - redis

  queue:
    image: steman-alumni-app:latest
    restart: always
    env_file: .env
    command: php artisan queue:work --tries=3 --sleep=3 --timeout=60
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 256M
    networks:
      - steman-network
    depends_on:
      - app
      - redis

  redis:
    image: redis:alpine
    container_name: steman_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 64M
    networks:
      - steman-network

  reverb:
    image: steman-alumni-app:latest
    container_name: steman_reverb
    restart: always
    env_file: .env
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 256M
    networks:
      - steman-network
    depends_on:
      - app

  webserver:
    image: nginx:alpine
    container_name: steman_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - app_public:/var/www/public
      - ./storage:/var/www/storage:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 128M
    depends_on:
      - app
    networks:
      - steman-network

  certbot:
    image: certbot/certbot:latest
    container_name: steman_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    depends_on:
      - webserver

  db:
    image: mariadb:10.6
    container_name: steman_db
    restart: always
    env_file: .env
    # Removed healthcheck temporarily to ensure startup
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - steman-network

networks:
  steman-network:
    driver: bridge

volumes:
  dbdata:
  certbot_certs:
  certbot_www:
  app_public:
