# Steman Alumni - PRODUCTION Docker Compose
services:
  app:
    image: steman-alumni-app:latest
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    working_dir: /var/www
    env_file: .env
    # Removed healthcheck temporarily to ensure startup
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - SESSION_SECURE_COOKIE=true
      - SESSION_HTTP_ONLY=true
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap:/var/www/bootstrap
      - ./docker/php/fpm-pool.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      - ./artisan:/var/www/artisan
      - app_public:/var/www/public
      # --- KODE PHP: Mount langsung agar file baru tidak perlu rebuild image ---
      - ./app:/var/www/app
      - ./resources:/var/www/resources
      - ./routes:/var/www/routes
      - ./config:/var/www/config
      - ./database:/var/www/database
      - ./vendor:/var/www/vendor
    networks:
      - steman-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - db
      - redis

  queue:
    image: steman-alumni-app:latest
    restart: always
    env_file: .env
    command: php artisan queue:work redis --tries=3 --sleep=3 --timeout=60 --max-jobs=500 --max-time=3600
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 256M
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap:/var/www/bootstrap
      - ./docker/php/fpm-pool.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      - ./artisan:/var/www/artisan
      - ./app:/var/www/app
      - ./resources:/var/www/resources
      - ./routes:/var/www/routes
      - ./config:/var/www/config
      - ./database:/var/www/database
      - ./vendor:/var/www/vendor
    networks:
      - steman-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - app
      - redis

  redis:
    image: redis:alpine
    container_name: steman_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 192M
    networks:
      - steman-network

  reverb:
    image: steman-alumni-app:latest
    container_name: steman_reverb
    restart: always
    env_file: .env
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 256M
    networks:
      - steman-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - app
    volumes:
      - ./bootstrap:/var/www/bootstrap
      - ./artisan:/var/www/artisan
      - ./vendor:/var/www/vendor
      - app_public:/var/www/public

  webserver:
    image: macbre/nginx-brotli:latest
    container_name: steman_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - app_public:/var/www/public
      - ./storage:/var/www/storage:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 128M
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - steman-network

  certbot:
    image: certbot/certbot:latest
    container_name: steman_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    depends_on:
      - webserver

  db:
    image: mariadb:10.6
    container_name: steman_db
    restart: always
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root --password=$${DB_PASSWORD} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - steman-network

networks:
  steman-network:
    driver: bridge

volumes:
  dbdata:
  certbot_certs:
  certbot_www:
  app_public:
