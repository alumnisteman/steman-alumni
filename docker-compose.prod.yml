# Steman Alumni - PRODUCTION Docker Compose
services:
  app:
    image: steman-alumni-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    working_dir: /var/www
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      # Note: PHP-FPM doesn't speak HTTP directly on 9000, 
      # but in this setup, Nginx is in another container.
      # We should use a script or check if PHP-FPM is responsive.
      # Better: use a PHP script to check internal health.
      test: ["CMD", "php", "artisan", "about"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    deploy:
      replicas: 3
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
      - app_public:/var/www/public
    networks:
      - steman-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  queue:
    image: steman-alumni-app:latest
    restart: always
    env_file: .env
    command: php artisan queue:work --tries=3 --sleep=3 --timeout=60
    networks:
      - steman-network
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:alpine
    container_name: steman_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - steman-network

  reverb:
    image: steman-alumni-app:latest
    container_name: steman_reverb
    restart: always
    env_file: .env
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    networks:
      - steman-network
    depends_on:
      app:
        condition: service_healthy

  webserver:
    image: nginx:alpine
    container_name: steman_nginx
    restart: always
    ports:
      - "${APP_PORT:-8000}:80"
      - "${SSL_PORT:-8443}:443"
    volumes:
      - app_public:/var/www/public
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      app:
        condition: service_healthy
    networks:
      - steman-network

  certbot:
    image: certbot/certbot:latest
    container_name: steman_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    depends_on:
      - webserver

  db:
      image: mariadb:10.6
      container_name: steman_db
      restart: always
      env_file: .env
      environment:
        MARIADB_DATABASE: ${DB_DATABASE}
        MARIADB_USER: ${DB_USERNAME}
        MARIADB_PASSWORD: ${DB_PASSWORD}
        MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USERNAME}", "-p${DB_PASSWORD}"]
        interval: 10s
        timeout: 5s
        retries: 5
      volumes:
        - dbdata:/var/lib/mysql
      networks:
        - steman-network

networks:
  steman-network:
    driver: bridge

volumes:
  dbdata:
  certbot_certs:
  certbot_www:
  app_public:
