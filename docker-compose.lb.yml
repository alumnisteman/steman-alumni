# ==========================================================
# Steman Alumni - Docker Compose with Load Balancer
# Long-term solution to prevent 521/526/500 errors
# ==========================================================
services:
  # Load Balancer (HAProxy)
  loadbalancer:
    image: haproxy:2.9-alpine
    container_name: steman_loadbalancer
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8404:8404"  # HAProxy stats
    volumes:
      - ./docker/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - certbot_certs:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8404/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 128M
    networks:
      - steman-network
    depends_on:
      - app1
      - app2
      - app3

  # App Instance 1
  app1:
    image: steman-alumni-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: steman_app1
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_INSTANCE_ID=1
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    volumes:
      - ./.env:/var/www/.env
      - ./storage:/var/www/storage
      - ./bootstrap:/var/www/bootstrap
      - ./public:/var/www/public
      - ./app:/var/www/app
      - ./resources:/var/www/resources
      - ./routes:/var/www/routes
      - ./config:/var/www/config
      - ./database:/var/www/database
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - steman-network
    depends_on:
      - db
      - redis

  # App Instance 2
  app2:
    image: steman-alumni-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: steman_app2
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_INSTANCE_ID=2
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    volumes:
      - ./.env:/var/www/.env
      - ./storage:/var/www/storage
      - ./bootstrap:/var/www/bootstrap
      - ./public:/var/www/public
      - ./app:/var/www/app
      - ./resources:/var/www/resources
      - ./routes:/var/www/routes
      - ./config:/var/www/config
      - ./database:/var/www/database
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - steman-network
    depends_on:
      - db
      - redis

  # App Instance 3
  app3:
    image: steman-alumni-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: steman_app3
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_INSTANCE_ID=3
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    volumes:
      - ./.env:/var/www/.env
      - ./storage:/var/www/storage
      - ./bootstrap:/var/www/bootstrap
      - ./public:/var/www/public
      - ./app:/var/www/app
      - ./resources:/var/www/resources
      - ./routes:/var/www/routes
      - ./config:/var/www/config
      - ./database:/var/www/database
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - steman-network
    depends_on:
      - db
      - redis

  # Queue Worker
  queue:
    image: steman-alumni-app:latest
    container_name: steman_queue
    restart: unless-stopped
    env_file: .env
    command: php artisan queue:work redis --tries=3 --sleep=3 --timeout=60 --max-jobs=500 --max-time=3600
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 256M
    volumes:
      - ./.env:/var/www/.env
      - ./storage:/var/www/storage
      - ./bootstrap:/var/www/bootstrap
      - ./app:/var/www/app
      - ./resources:/var/www/resources
      - ./routes:/var/www/routes
      - ./config:/var/www/config
      - ./database:/var/www/database
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - steman-network
    depends_on:
      - app1
      - redis

  # Redis
  redis:
    image: redis:alpine
    container_name: steman_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 192M
    networks:
      - steman-network

  # Reverb
  reverb:
    image: steman-alumni-app:latest
    container_name: steman_reverb
    restart: unless-stopped
    env_file: .env
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 256M
    volumes:
      - ./.env:/var/www/.env
      - ./storage:/var/www/storage
      - ./bootstrap:/var/www/bootstrap
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - steman-network
    depends_on:
      - app1

  # Database
  db:
    image: mariadb:10.6
    container_name: steman_db
    restart: unless-stopped
    env_file: .env
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
    command: [
      "mysqld",
      "--innodb-buffer-pool-size=256M",
      "--innodb-log-file-size=64M",
      "--query-cache-size=32M",
      "--query-cache-type=1",
      "--max-connections=150",
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_unicode_ci"
    ]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root --password=$${MARIADB_ROOT_PASSWORD} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    volumes:
      - dbdata:/var/lib/mysql
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - steman-network

  # Meilisearch
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: steman_meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_KEY:-masterKey}
      - MEILI_NO_ANALYTICS=true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 256M
    volumes:
      - meilidata:/meili_data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - steman-network

  # Certbot for SSL
  certbot:
    image: certbot/certbot:latest
    container_name: steman_certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    depends_on:
      - loadbalancer

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: steman_prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 256M
    networks:
      - steman-network
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: 2

  node-exporter:
    image: prom/node-exporter:latest
    container_name: steman_node_exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 64M
    networks:
      - steman-network

  grafana:
    image: grafana/grafana:latest
    container_name: steman_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=StemanGrafana2026!
      - GF_SERVER_ROOT_URL=https://admin.alumni-steman.my.id/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SERVER_PROTOCOL=http
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 512M
    networks:
      - steman-network
    depends_on:
      - node-exporter
      - prometheus
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: 2

networks:
  steman-network:
    driver: bridge

volumes:
  dbdata:
    name: steman-alumni_dbdata
  meilidata:
    name: steman-alumni_meilidata
  certbot_certs:
    name: steman-alumni_certbot_certs
  certbot_www:
    name: steman-alumni_certbot_www
  grafana_data:
    name: steman-alumni_grafana_data
  prometheus_data:
    name: steman-alumni_prometheus_data
