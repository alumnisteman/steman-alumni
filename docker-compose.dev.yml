# Steman Alumni - DEVELOPMENT Docker Compose
services:
  app:
    image: steman-alumni-app-dev:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: steman_app_dev
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    command: sh -c "composer install && php-fpm"
    networks:
      - steman-network
    depends_on:
      - db
      - redis

  queue:
    image: steman-alumni-app-dev:latest
    container_name: steman_queue_dev
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./:/var/www
    command: sh -c "composer install && php artisan queue:work --tries=3 --sleep=3 --timeout=60"
    networks:
      - steman-network
    depends_on:
      - app
      - redis

  redis:
    image: redis:alpine
    container_name: steman_redis_dev
    restart: unless-stopped
    networks:
      - steman-network

  # Reverb
  reverb:
    image: steman-alumni-app-dev:latest
    container_name: steman_reverb_dev
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env
    volumes:
      - ./:/var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    networks:
      - steman-network
    depends_on:
      - app

  webserver:
    image: nginx:alpine
    container_name: steman_nginx_dev
    restart: unless-stopped
    ports:
      - "8000:80"
      - "8080:8080" # Exposed for reverb if client connects directly
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - steman-network

  db:
    image: mariadb:10.6
    container_name: steman_db_dev
    restart: unless-stopped
    env_file: .env
    volumes:
      - dbdata_dev:/var/lib/mysql
    networks:
      - steman-network

networks:
  steman-network:
    driver: bridge

volumes:
  dbdata_dev:
