name: Steman Alumni CI/CD

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install PHP dependencies
        run: |
          docker run --rm -v "${{ github.workspace }}:/app" -w /app composer:2.7 php -d extension=pdo_mysql -d extension=mysqli composer install --ignore-platform-reqs --no-dev --optimize-autoloader
      - name: Build assets
        run: |
          docker run --rm -v "${{ github.workspace }}:/app" -w /app node:20-alpine sh -c "npm install && npm run build"
      - name: Deploy Staging
        run: |
          docker compose -f docker-compose.staging.yml up -d --build --scale app=2 --wait
      - name: Staging health check
        run: |
          sleep 5
          curl --silent --fail http://localhost:8081/health || exit 1
      - name: Staging migrations
        run: |
          docker compose -f docker-compose.staging.yml exec -T app php artisan migrate --force

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: self-hosted
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy Production
        run: |
          docker compose -f docker-compose.prod.yml up -d --build --scale app=3 --wait
      - name: Production health check
        run: |
          sleep 5
          curl --silent --fail http://localhost:8000/health || exit 1
      - name: Production migrations
        run: |
          docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force
