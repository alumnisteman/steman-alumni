name: 🚀 Steman Alumni — Auto Deploy Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: 🏗️ Deploy ke Server Production
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout kode terbaru
        uses: actions/checkout@v4

      - name: 🐘 Validasi sintaks PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gd, pdo_mysql, mbstring, zip, bcmath, intl
          coverage: none

      - name: 🔍 PHP Syntax Check
        run: find app -name "*.php" | xargs -P4 php -l 2>&1 | grep -E "^(Parse|Fatal)" && exit 1 || echo "✅ Semua PHP valid"

      - name: 🚀 Deploy ke Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_SSH_PASSWORD }}
          port: 22
          timeout: 600s
          script: |
            set -e
            DEPLOY_DIR="/var/www/steman-alumni"
            APP="docker exec steman_app"

            echo "📁 Masuk ke direktori: $DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            echo "🔄 Pull kode terbaru dari GitHub..."
            git fetch origin main
            git reset --hard origin/main

            echo "🗄️ Jalankan migrasi (jika ada yang pending)..."
            $APP php artisan migrate --force

            echo "🧹 Bersihkan semua cache lama..."
            $APP php artisan optimize:clear

            echo "⚡ Rebuild cache production di dalam container..."
            $APP php artisan config:cache
            $APP php artisan route:cache
            $APP php artisan view:cache
            $APP php artisan event:cache

            echo "🔗 Pastikan symlink storage masih ada..."
            $APP php artisan storage:link --force 2>/dev/null || true

            echo "🔧 Fix permission storage..."
            $APP chown -R www-data:www-data /var/www/storage /var/www/bootstrap/cache 2>/dev/null || true
            $APP chmod -R 775 /var/www/storage /var/www/bootstrap/cache 2>/dev/null || true

            echo "⚙️ Reset PHP opcache di semua container..."
            for container in steman_app steman_scheduler steman_queue steman_reverb; do
              docker exec $container php -r "if(function_exists('opcache_reset')){opcache_reset(); echo \"$container: opcache cleared\n\";}" 2>/dev/null || true
            done

            echo "🔁 Restart queue workers (graceful)..."
            $APP php artisan queue:restart

            echo "🏥 Verifikasi: jalankan System Guard..."
            $APP php artisan system:guard 2>/dev/null || true

            echo ""
            echo "✅ Deploy selesai! $(date)"
            echo "🌐 Cek: https://alumni-steman.my.id"

      - name: 🌐 Health Check — Verifikasi Situs Online
        run: |
          sleep 5
          URLS=(
            "https://alumni-steman.my.id"
            "https://alumni-steman.my.id/login"
            "https://alumni-steman.my.id/global-network"
          )
          FAIL=0
          for url in "${URLS[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$url" || echo "000")
            if [[ "$STATUS" == "200" || "$STATUS" == "301" || "$STATUS" == "302" ]]; then
              echo "✅ $url → HTTP $STATUS"
            else
              echo "❌ $url → HTTP $STATUS"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 1 ]; then
            echo "⚠️ Ada halaman yang tidak merespons normal setelah deploy!"
            exit 1
          fi

      - name: 📣 Notifikasi Deploy Berhasil
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            -d "text=✅ *Deploy Berhasil!*%0A━━━━━━━━━━━━━━━━%0A🌐 https://alumni-steman.my.id%0A📦 Commit: \`${{ github.sha }}\`%0A👤 By: ${{ github.actor }}%0A🕒 $(date '+%d %b %Y %H:%M')" \
          && echo "Notifikasi Telegram terkirim" || echo "Gagal kirim Telegram (skip)"

      - name: 🚨 Notifikasi Deploy Gagal
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            -d "text=🚨 *Deploy GAGAL!*%0A━━━━━━━━━━━━━━━━%0A📦 Commit: \`${{ github.sha }}\`%0A👤 By: ${{ github.actor }}%0A🔗 Lihat log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          && echo "Notifikasi gagal terkirim" || echo "Gagal kirim Telegram (skip)"
