name: Deploy to Production

on:
  push:
    branches:
      - main
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy and Test via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /var/www
          
          echo "Pulling latest code..."
          git pull origin main || echo "Git pull failed or no git repo"
          
          echo "Running Database Backup..."
          if [ -f /var/www/scripts/backup-db.sh ]; then
            bash /var/www/scripts/backup-db.sh
          else
            echo "Backup script not found, skipping..."
          fi
          
          echo "Deploying Containers..."
          docker-compose up -d --build
          
          echo "Running End-to-End Tests (Dusk)..."
          # Wait for app to be ready
          sleep 10
          docker exec -i steman_app php artisan dusk
