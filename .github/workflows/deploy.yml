name: Steman Alumni CI/CD [v4.1 Hardened]

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    name: Deploy to Local Server
    runs-on: self-hosted
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Pre-deployment Cleanup
        run: |
          rm -rf public/assets/build || true

      - name: Deploy with Docker Compose (Rolling Update)
        run: |
          set -e
          # Deploy with Docker Compose (Rolling Update)
          docker compose -f docker-compose.prod.yml up -d --build --scale app=3 --wait
          DEPLOY_EXIT=$?
          if [ $DEPLOY_EXIT -ne 0 ]; then
            echo "ERROR: docker compose failed with exit code $DEPLOY_EXIT"
            exit $DEPLOY_EXIT
          fi
          
      - name: Final Health Check Verification
        run: |
          echo "Starting Comprehensive Health Check..."
          # Give a small buffer for Nginx proxy pass to stabilize
          sleep 5
          
          # Ping the /health endpoint through the webserver port (8000)
          HEALTH_STATUS=$(curl --silent --fail http://localhost:8000/health)
          
          if [ $? -eq 0 ]; then
                echo "Deployment Success! JSON Status: $HEALTH_STATUS"
                docker image prune -f
          else
                echo "CRITICAL: Health Check Failed! Reverting or alerting team..."
                # Since we use --wait, if it reaches here, something is fundamentally wrong with Nginx or the cluster
                exit 1
          fi

      - name: Production Initialization & Migrations (v4.1 Hardened)
        run: |
          # Production Initialization & Migrations (v4.1 Hardened)
          docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force
          
          # Full v4.1 Optimization Stack
          docker compose -f docker-compose.prod.yml exec -T app php artisan optimize:clear
          docker compose -f docker-compose.prod.yml exec -T app php artisan optimize
          
          # Nginx Cache Purge (Fix for persistent cached views)
          docker compose -f docker-compose.prod.yml exec -T webserver sh -c 'rm -rf /tmp/nginx_cache/*'
          docker compose -f docker-compose.prod.yml restart webserver
          
          # Final Permission Enforcement (v4.1.1 Production Hardened) - run only once
          if [ ! -f /var/www/.permissions_set ]; then
            docker compose -f docker-compose.prod.yml exec -T app chown -R www-data:www-data /var/www
            docker compose -f docker-compose.prod.yml exec -T app chmod -R 755 /var/www
            docker compose -f docker-compose.prod.yml exec -T app chmod -R 775 /var/www/storage /var/www/bootstrap/cache
            docker compose -f docker-compose.prod.yml exec -T app touch /var/www/.permissions_set
          fi
