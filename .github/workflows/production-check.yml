name: 🔍 Steman Alumni — PHP Static Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  php-lint:
    name: PHP Syntax Check (8.4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, gd, json, bcmath
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: PHP Syntax Check — Semua File App
        run: |
          echo "Memeriksa sintaks PHP..."
          ERRORS=$(find app -name "*.php" | xargs -P4 php -l 2>&1 | grep -E "^(Parse|Fatal)" || true)
          if [ -n "$ERRORS" ]; then
            echo "❌ Ditemukan error sintaks:"
            echo "$ERRORS"
            exit 1
          fi
          echo "✅ Semua file PHP valid"

      - name: PHPStan Static Analysis
        run: vendor/bin/phpstan analyse -c phpstan.neon --memory-limit=2G --no-progress
        continue-on-error: true
