global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: 'steman-laravel'
    static_configs:
      - targets: ['steman_nginx:80']
    metrics_path: /metrics
    honor_labels: true

  - job_name: 'nginx'
    static_configs:
      - targets: ['steman_nginx_exporter:9113']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'steman-node-exporter'
    static_configs:
      - targets: ['steman_node_exporter:9100']
