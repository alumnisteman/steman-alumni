server {
    listen 443 ssl http2;
    server_name meili.alumni-steman.my.id;

    ssl_certificate /etc/letsencrypt/live/alumni-steman.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alumni-steman.my.id/privkey.pem;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $meili "steman_meilisearch";
        proxy_pass http://$meili:7700;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl http2;
    server_name admin.alumni-steman.my.id;

    ssl_certificate /etc/letsencrypt/live/alumni-steman.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alumni-steman.my.id/privkey.pem;

    server_tokens off;

    resolver 127.0.0.11 valid=30s;

    # Proxy Grafana at /grafana/
    location /grafana/ {
        set $grafana "steman_grafana";
        proxy_pass http://$grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
        proxy_connect_timeout 10;
        proxy_send_timeout 300;
    }

    # Proxy all other /admin and / requests to the Laravel app
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        include fastcgi_params;
    }
}
