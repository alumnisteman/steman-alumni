resolver 127.0.0.11 valid=30s;

# Dynamic map to rate-limit ONLY /login and /register paths
map $request_uri $auth_limit_key {
    default "";
    "~* ^/(login|register)" $binary_remote_addr;
}
limit_req_zone $auth_limit_key zone=authlimit:10m rate=10r/m;



# Rate Limiting Configuration (Request rate)
limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;
limit_req_status 429;

# Connection Limiting Configuration (Simultaneous connections)
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name alumni-steman.my.id www.alumni-steman.my.id admin.alumni-steman.my.id api.alumni-steman.my.id localhost;
    
    # Hide Nginx version
    server_tokens off;

    # Cloudflare Real IP Support
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # Certbot challenge location (SSL prep)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health Check for Docker (Must be before 301 redirect)
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'healthy';
    }

    # Prometheus Metrics (Must be before 301 redirect)
    location /metrics {
        fastcgi_pass app:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
    }

    location /nginx_status {
        stub_status;
        allow all; # Internal only would be better but this is port 80 inside docker
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.alumni-steman.my.id;
    
    # SSL Configuration (uses same cert as apex)
    ssl_certificate /etc/letsencrypt/live/alumni-steman.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alumni-steman.my.id/privkey.pem;

    # Redirect WWW to Non-WWW
    return 301 https://alumni-steman.my.id$request_uri;
}

server {
    listen 443 ssl http2;
    server_name alumni-steman.my.id api.alumni-steman.my.id;
    root /var/www/public;
    
    # Hide Nginx version
    server_tokens off;

    # Anti-Traffic Spike (Global per server)
    limit_conn addr 50; # Allow 50 simultaneous connections per IP
    limit_req zone=authlimit burst=5 nodelay; # Apply strict rate limit dynamically for auth routes
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 10s;

    ssl_certificate /etc/letsencrypt/live/alumni-steman.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alumni-steman.my.id/privkey.pem;

    # --- Robust Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data: blob:; font-src 'self' https: data:; frame-src 'self' https:; connect-src 'self' https: wss:;" always;

    index index.php;
    charset utf-8;
    client_max_body_size 50M;

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    # FastCGI response buffering (prevents PHP-FPM from blocking on slow clients)
    fastcgi_buffering on;
    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;
    fastcgi_busy_buffers_size 32k;
    fastcgi_temp_file_write_size 256k;

    # --- Performance: Compression ---
    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Brotli (Even better compression than Gzip)
    brotli on;
    brotli_comp_level 6;
    brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # DNS Resolver for Docker (Required for dynamic proxy_pass with variables)
    resolver 127.0.0.11 valid=30s;

    # Cache bypass logic for sensitive paths and all write operations
    set $skip_cache 0;
    if ($request_uri ~* "/(login|register|admin|api/story/view)") {
        set $skip_cache 1;
    }
    # CRITICAL: Never cache POST/PUT/PATCH/DELETE requests (story uploads, feed posts, etc.)
    if ($request_method ~* "^(POST|PUT|PATCH|DELETE)$") {
        set $skip_cache 1;
    }

    location / {
        # Apply Resilient Rate Limiting
        # burst=30 allows for sudden surges while protecting the backend
        limit_req zone=mylimit burst=30 nodelay;
        
        try_files $uri $uri/ /index.php?$query_string;
    }


    # --- Force Fresh Admin Dashboard (Disable Caching) ---
    location /admin {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Block access to .git, .env, etc
    location ~ /\.(env|git) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to vendor directory
    location ^~ /vendor/ {
        deny all;
        return 404;
    }


    # Fix: Catch double-prefix storage URLs (e.g. /storage/storage/avatars/...)
    location ~ ^/storage/storage/(.*)$ {
        rewrite ^/storage/storage/(.*)$ /storage/$1 permanent;
    }

    # Serve storage files directly from the app's public storage directory
    location /storage {
        root /var/www/public;
        try_files $uri $uri/ =404;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Reverb WebSockets - Dynamic DNS to prevent 'Host is unreachable' errors
    location /app {
        set $upstream_reverb reverb;
        proxy_pass http://$upstream_reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        set $upstream_app app;
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass $upstream_app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 120;

        # FastCGI Cache for anonymous/public GET requests
        # Bypasses cache if $skip_cache is 1 (login, register, admin) or if user is logged in
        fastcgi_cache_bypass $skip_cache $cookie_XSRF-TOKEN $cookie_laravel_session $http_authorization;
        fastcgi_no_cache $skip_cache $cookie_XSRF-TOKEN $cookie_laravel_session $http_authorization;
        fastcgi_cache LARAVEL;
        fastcgi_cache_valid 200 5m;
        fastcgi_cache_valid 404 1m;
        add_header X-FastCGI-Cache $upstream_cache_status;
    }

    # Block dangerous files in storage
    location ~ ^/storage/.*\.php$ {
        deny all;
        return 404;
    }
}
