upstream php-handler {
    server app:9000;
}

# Rate Limiting Configuration
limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;
limit_req_status 429;

server {
    listen 80;
    server_name _;
    
    # Hide Nginx version
    server_tokens off;

    # Certbot challenge location (SSL prep)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;
    root /var/www/public;
    
    # Hide Nginx version
    server_tokens off;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # --- Robust Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' https: data:;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    index index.php;
    charset utf-8;
    client_max_body_size 50M;

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    # Gzip settings for performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location / {
        # Apply Rate Limiting
        limit_req zone=mylimit burst=20 nodelay;
        
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    # Block access to .git, .env, etc
    location ~ /\.(env|git) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to vendor directory
    location ^~ /vendor/ {
        deny all;
        return 404;
    }


    # Fix: Explicitly serve storage files from the app/public directory
    location /storage {
        alias /var/www/storage/app/public;
        try_files $uri $uri/ =404;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Reverb WebSockets
    location /app {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
    error_page 404 /index.php;

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php-handler;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120;
    }

    # Block dangerous files in storage
    location ~ ^/storage/.*\.php$ {
        deny all;
        return 404;
    }
}
