# ==========================================================
# HAProxy Configuration for Steman Alumni
# Load Balancer with SSL Termination
# ==========================================================

global
    log /dev/log local0
    log /dev/log local1 notice
    # chroot /var/lib/haproxy
    # stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # Default SSL material locations
    ca-base /etc/ssl/certs
    crt-base /etc/letsencrypt

    # Default ciphers to use on SSL-enabled listening sockets
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-options no-sslv3 no-tlsv10

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

# Statistics page
listen stats
    bind *:8404
    mode http
    stats enable
    stats hide-version
    stats realm HAProxy\ Statistics
    stats auth admin:StemanHAProxy2026!
    stats uri /
    stats refresh 10s

# HTTP frontend (for testing without SSL)
frontend http-in
    bind *:80
    mode http
    option httplog
    option forwardfor
    
    # ACL for different domains
    acl is_admin hdr(host) -i admin.alumni-steman.my.id
    acl is_www hdr(host) -i www.alumni-steman.my.id
    acl is_main hdr(host) -i alumni-steman.my.id
    
    # Route to different backends based on domain
    use_backend admin_backend if is_admin
    use_backend www_backend if is_www
    use_backend main_backend if is_main
    default_backend main_backend

# Main site backend
backend main_backend
    mode http
    balance roundrobin
    option httpchk GET /
    http-check expect status 200
    cookie SERVERID insert indirect nocache
    server nginx steman_nginx:80 check cookie nginx inter 2000 rise 2 fall 3 maxconn 100

# Admin subdomain backend
backend admin_backend
    mode http
    balance roundrobin
    option httpchk GET /
    http-check expect status 200
    cookie SERVERID insert indirect nocache
    server nginx steman_nginx:80 check cookie nginx inter 2000 rise 2 fall 3 maxconn 50

# WWW subdomain backend
backend www_backend
    mode http
    balance roundrobin
    option httpchk GET /
    http-check expect status 200
    cookie SERVERID insert indirect nocache
    server nginx steman_nginx:80 check cookie nginx inter 2000 rise 2 fall 3 maxconn 100

# Health check endpoint
frontend health-check
    bind *:8080
    mode http
    http-request deny unless { path /health }
    default_backend health_backend

backend health_backend
    mode http
    option httpchk GET /
    http-check expect status 200
    server nginx steman_nginx:80 check
