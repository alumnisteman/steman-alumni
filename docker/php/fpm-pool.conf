; PHP-FPM Pool Configuration for Production
; Dioptimalkan untuk VPS 8GB RAM — server ini punya RAM yang cukup
; Container limit: 512M → setiap worker ~45MB → max 25 aman

[www]
user = www-data
group = www-data

; Listen on all interfaces (0.0.0.0)
listen = 0.0.0.0:9000
listen.owner = www-data
listen.group = www-data

; Dynamic process management — skala dengan traffic
pm = dynamic

; Max concurrent PHP processes: 25 (naik dari 15)
; Server RAM 8GB, container limit 512M, tiap worker ~45MB
pm.max_children = 25

; Proses yang distart saat boot
pm.start_servers = 5

; Minimal idle workers — responsif saat traffic naik
pm.min_spare_servers = 4

; Matikan idle worker di atas ini untuk hemat RAM
pm.max_spare_servers = 10

; Restart worker setelah N request (cegah memory leak)
pm.max_requests = 500

; Log slow request (> 3 detik lebih sensitif)
request_slowlog_timeout = 3s
slowlog = /var/log/php-fpm-slow.log

; Timeout per request — turunkan dari 120s ke 30s
; Request >30s hampir pasti bug/loop, lebih baik dibunuh
request_terminate_timeout = 30

; Status page (untuk monitoring)
pm.status_path = /fpm-status
