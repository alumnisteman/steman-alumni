; PHP-FPM Pool Configuration for Production
; Optimized for a VPS with 1-2 vCPU and 1-2GB RAM

[www]
user = www-data
group = www-data

; Listen on all interfaces (0.0.0.0)
listen = 0.0.0.0:9000
listen.owner = www-data
listen.group = www-data

; Dynamic process management — scales with traffic
pm = dynamic

; Max concurrent PHP processes (each uses ~30-60MB RAM)
; For 512MB limit: 512 / 40 = ~12 max children
pm.max_children = 15

; Processes started on boot
pm.start_servers = 4

; Always keep at least this many idle workers
pm.min_spare_servers = 3

; Kill idle workers above this count to free RAM
pm.max_spare_servers = 8

; Restart worker after N requests to prevent memory leaks
pm.max_requests = 500

; Log slow requests (> 5 seconds)
request_slowlog_timeout = 5s
slowlog = /var/log/php-fpm-slow.log

; Timeout for a single request
request_terminate_timeout = 120

; Status page (for monitoring)
pm.status_path = /fpm-status
