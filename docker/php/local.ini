upload_max_filesize = 50M
post_max_size = 50M
max_file_uploads = 50
memory_limit = 256M
max_execution_time = 120
default_charset = "UTF-8"

; Realpath cache — reduces stat() syscalls per request significantly
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Misc performance
expose_php = Off
zlib.output_compression = On
