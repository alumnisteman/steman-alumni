# ==========================================================
# Steman Alumni - Docker Compose for Load Balancer Testing
# Single app instance for initial testing
# ==========================================================
services:
  # Load Balancer (HAProxy)
  loadbalancer:
    image: haproxy:3.0-alpine
    container_name: steman_loadbalancer
    restart: unless-stopped
    ports:
      - "8081:80"
      - "8443:443"
      - "8404:8404"  # HAProxy stats
    volumes:
      - ./docker/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - certbot_certs:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8404/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 128M
    networks:
      - steman-network
    depends_on:
      - app

  # Single App Instance for Testing
  app:
    image: steman-alumni-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: steman_app_test
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_INSTANCE_ID=test
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    volumes:
      - ./.env:/var/www/.env
      - ./storage:/var/www/storage
      - ./bootstrap:/var/www/bootstrap
      - ./public:/var/www/public
      - ./app:/var/www/app
      - ./resources:/var/www/resources
      - ./routes:/var/www/routes
      - ./config:/var/www/config
      - ./database:/var/www/database
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - steman-network
    depends_on:
      - db
      - redis

  # Queue Worker
  queue:
    image: steman-alumni-app:latest
    container_name: steman_queue_test
    restart: unless-stopped
    env_file: .env
    command: php artisan queue:work redis --tries=3 --sleep=3 --timeout=60 --max-jobs=500 --max-time=3600
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 256M
    volumes:
      - ./.env:/var/www/.env
      - ./storage:/var/www/storage
      - ./bootstrap:/var/www/bootstrap
      - ./app:/var/www/app
      - ./resources:/var/www/resources
      - ./routes:/var/www/routes
      - ./config:/var/www/config
      - ./database:/var/www/database
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - steman-network
    depends_on:
      - app
      - redis

  # Redis
  redis:
    image: redis:alpine
    container_name: steman_redis_test
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 192M
    networks:
      - steman-network

  # Reverb
  reverb:
    image: steman-alumni-app:latest
    container_name: steman_reverb_test
    restart: unless-stopped
    env_file: .env
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 256M
    volumes:
      - ./.env:/var/www/.env
      - ./storage:/var/www/storage
      - ./bootstrap:/var/www/bootstrap
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - steman-network
    depends_on:
      - app

  # Database
  db:
    image: mariadb:10.6
    container_name: steman_db_test
    restart: unless-stopped
    env_file: .env
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
    command: [
      "mysqld",
      "--innodb-buffer-pool-size=256M",
      "--innodb-log-file-size=64M",
      "--query-cache-size=32M",
      "--query-cache-type=1",
      "--max-connections=150",
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_unicode_ci"
    ]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root --password=$${MARIADB_ROOT_PASSWORD} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    volumes:
      - dbdata_test:/var/lib/mysql
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - steman-network

  # Meilisearch
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: steman_meilisearch_test
    restart: unless-stopped
    ports:
      - "7701:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_KEY:-masterKey}
      - MEILI_NO_ANALYTICS=true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 256M
    volumes:
      - meilidata_test:/meili_data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - steman-network

networks:
  steman-network:
    driver: bridge

volumes:
  dbdata_test:
    name: steman-alumni_dbdata_test
  meilidata_test:
    name: steman-alumni_meilidata_test
  certbot_certs:
    name: steman-alumni_certbot_certs
