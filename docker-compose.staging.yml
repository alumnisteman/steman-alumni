version: '3.8'

services:
  app:
    image: steman-alumni-app:latest
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    working_dir: /var/www
    env_file: .env.staging
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    volumes:
      - ./.env.staging:/var/www/.env
      - ./storage:/var/www/storage
      - ./bootstrap:/var/www/bootstrap
      - ./docker/php/fpm-pool.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      - ./artisan:/var/www/artisan
      - app_public:/var/www/public
      - ./app:/var/www/app
      - ./resources:/var/www/resources
      - ./routes:/var/www/routes
      - ./config:/var/www/config
      - ./database:/var/www/database
      - ./vendor:/var/www/vendor
    networks:
      - steman-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - db
      - redis

  webserver:
    image: macbre/nginx-brotli:latest
    container_name: steman_nginx_staging
    restart: always
    ports:
      - "8081:80"
      - "8443:443"
    volumes:
      - app_public:/var/www/public
      - ./storage:/var/www/storage:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 128M
    networks:
      - steman-network
    depends_on:
      app:
        condition: service_healthy

  redis:
    image: redis:alpine
    container_name: steman_redis_staging
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: php artisan reverb:start --host=0.0.0.0 --port=8081
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 192M
    networks:
      - steman-network

  db:
    image: mariadb:10.6
    container_name: steman_db_staging
    restart: always
    env_file: .env.staging
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root --password=$${DB_PASSWORD} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - steman-network

networks:
  steman-network:
    driver: bridge

volumes:
  dbdata:
  certbot_certs:
  certbot_www:
  app_public:
    driver: local
