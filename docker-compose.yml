# Steman Alumni - DEFAULT / PRODUCTION Docker Compose
services:
  app:
    image: steman-alumni-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: steman_app
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap/app.php:/var/www/bootstrap/app.php
      - ./bootstrap/cache:/var/www/bootstrap/cache
      - ./public:/var/www/public
      - ./app:/var/www/app
      - ./resources:/var/www/resources
      - ./routes:/var/www/routes
      - ./config:/var/www/config
      - ./database:/var/www/database
    networks:
      - steman-network
    depends_on:
      - db
      - redis

  queue:
    image: steman-alumni-app:latest
    container_name: steman_queue
    restart: unless-stopped
    env_file: .env
    command: php artisan queue:work --tries=3 --sleep=3 --timeout=60
    networks:
      - steman-network
    depends_on:
      - app
      - redis

  redis:
    image: redis:alpine
    container_name: steman_redis
    restart: unless-stopped
    networks:
      - steman-network

  reverb:
    image: steman-alumni-app:latest
    container_name: steman_reverb
    restart: unless-stopped
    env_file: .env
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    networks:
      - steman-network
    depends_on:
      - app

  webserver:
    image: nginx:alpine
    container_name: steman_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./public:/var/www/public
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - app
    networks:
      - steman-network

  certbot:
    image: certbot/certbot:latest
    container_name: steman_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    depends_on:
      - webserver

  db:
      image: mariadb:10.6
      container_name: steman_db
      restart: unless-stopped
      env_file: .env
      environment:
        MARIADB_DATABASE: ${DB_DATABASE}
        MARIADB_USER: ${DB_USERNAME}
        MARIADB_PASSWORD: ${DB_PASSWORD}
        MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      volumes:
        - dbdata:/var/lib/mysql
      networks:
        - steman-network

networks:
  steman-network:
    driver: bridge

volumes:
  dbdata:
    name: steman-alumni_dbdata
  certbot_certs:
    name: steman-alumni_certbot_certs
  certbot_www:
    name: steman-alumni_certbot_www
